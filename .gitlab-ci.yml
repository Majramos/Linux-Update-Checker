workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - when: never

stages:
  - lint
  - test

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

default:
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache/
  before_script:
    - uv sync --frozen

check_format:
  stage: lint
  script:
    - uv run ruff format --check
    - uv run ruff check --output-format=gitlab --output-file=code-quality-report.json
  artifacts:
    when: always
    reports:
      codequality: code-quality-report.json

type_check:
  stage: lint
  script:
    - uv run mypy

run_tests:
  stage: test
  script:
    - uv run pytest --junitxml=report.xml --cov --cov-report=term --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*? (100(?:\\.0+)?\\%|[1-9]?\\d(?:\\.\\d+)?\\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - report.xml
      - coverage.xml
